name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python
        run: uv python install 3.11

      - name: Install Python dependencies
        run: uv sync

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build .app and .dmg
        run: ./build.sh --bundles dmg

      - name: Prepare artifacts
        run: |
          DMG=$(find src-tauri/target/release/bundle/dmg -name '*.dmg' | head -1)
          echo "DMG_PATH=$DMG" >> "$GITHUB_ENV"
          echo "DMG_NAME=$(basename "$DMG")" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ${{ env.DMG_PATH }}

  build-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package extension
        run: |
          cd extension
          zip -r ../local-voice-reader-${{ github.ref_name }}.zip . -x '*.DS_Store'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: local-voice-reader-${{ github.ref_name }}.zip

  release:
    needs: [build-macos, build-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/macos-dmg/*.dmg
            artifacts/chrome-extension/*.zip
