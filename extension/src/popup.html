<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=320">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Local Voice</h1>
      <div class="health">
        <span id="health-label">Checking...</span>
        <span id="health-dot" class="health-dot unknown"></span>
      </div>
    </header>

    <section id="status-bar">
      <span id="status-text">Ready</span>
      <span id="progress"></span>
    </section>

    <section id="controls">
      <button id="btn-stop" class="btn-transport btn-secondary" title="Stop" disabled>&#9632;</button>
      <button id="btn-speak" class="btn-transport btn-primary" title="Speak selected text">&#9654;</button>
      <button id="btn-pause" class="btn-transport btn-secondary" title="Pause" disabled>&#10074;&#10074;</button>
    </section>

    <section id="settings">
      <div class="setting-row">
        <span class="setting-label">Voice</span>
        <select id="voice-select">
          <option value="">Loading...</option>
        </select>
      </div>

      <div class="setting-row">
        <span class="setting-label">Speed</span>
        <div class="rate-control">
          <input type="range" id="rate-slider" min="0.5" max="2.0" step="0.1" value="1.0">
          <span id="rate-value">1.0x</span>
        </div>
      </div>

      <div class="setting-row">
        <span class="setting-label">Mode</span>
        <select id="mode-select">
          <option value="selection">Selection</option>
          <option value="article">Article</option>
        </select>
      </div>
    </section>

    <footer id="popup-footer">
      <a href="https://majesticlabs.dev" target="_blank" class="footer-brand">
        <img src="../icons/majestic-logo.svg" alt="Majestic Labs" class="footer-logo" />
        <span>Majestic Labs</span>
      </a>
      <span id="version"></span>
    </footer>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
